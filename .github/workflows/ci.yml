name: CI

on:
  push:
    branches:
      - main
    tags-ignore:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore solution
        run: dotnet restore Scrapile.slnx

      - name: Build solution
        run: dotnet build Scrapile.slnx -c Release --no-restore

      - name: Run tests
        run: dotnet test Scrapile.slnx -c Release --no-build
